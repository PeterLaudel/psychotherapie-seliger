services:
  app:
    build:
      context: .
      target: builder
    image: "${IMAGE:-psychotherapie-seliger:dev}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
